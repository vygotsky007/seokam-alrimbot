<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>석암 알림봇</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --bg: #f0f4ff;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --pill-bg: #eff6ff;
    --pill-active: #3b82f6;
    --pill-active-text: #fff;
    --radius: 14px;
  }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
  .container { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

  .app-header { text-align: center; padding: 18px 0 4px; }
  .app-header h1 { font-size: 1.45rem; font-weight: 800; color: var(--blue-dark); letter-spacing: -0.5px; }
  .app-header p { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }

  .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.05); }

  .hero-label { font-size: 0.78rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 6px; letter-spacing: .3px; }
  .textarea-wrap { position: relative; }
  #mainInput {
    width: 100%; min-height: 110px; border: 2px solid var(--border); border-radius: 10px;
    padding: 12px 38px 12px 12px; font-size: 0.95rem; font-family: inherit; color: var(--text);
    resize: vertical; outline: none; transition: border-color .2s; line-height: 1.6;
  }
  #mainInput:focus { border-color: var(--blue); }
  #clearBtn {
    position: absolute; top: 10px; right: 10px; background: none; border: none;
    font-size: 1.1rem; cursor: pointer; color: #aaa; line-height: 1; padding: 2px; display: none;
  }
  .char-count { font-size: 0.72rem; color: var(--muted); text-align: right; margin-top: 4px; }

  #generateBtn {
    width: 100%; padding: 14px; background: var(--blue); color: #fff; border: none;
    border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: background .2s, transform .1s;
  }
  #generateBtn:hover { background: var(--blue-dark); }
  #generateBtn:active { transform: scale(.98); }
  #generateBtn:disabled { background: #94a3b8; cursor: not-allowed; }

  .rec-section { display: flex; flex-direction: column; gap: 12px; }
  .rec-block-title { font-size: 0.78rem; font-weight: 700; color: var(--muted); margin-bottom: 7px; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    padding: 5px 11px; border-radius: 99px; border: 1.5px solid var(--border);
    font-size: 0.8rem; background: var(--pill-bg); color: var(--text);
    cursor: pointer; user-select: none; transition: all .15s;
  }
  .pill:hover { border-color: var(--blue); color: var(--blue); }
  .pill.active { background: var(--pill-active); color: var(--pill-active-text); border-color: var(--pill-active); }

  .expand-group { display: flex; flex-direction: column; gap: 8px; }
  .expand-header {
    display: flex; align-items: center; gap: 6px; cursor: pointer;
    font-size: 0.8rem; font-weight: 700; color: var(--muted); user-select: none;
  }
  .expand-arrow { transition: transform .2s; font-size: 0.7rem; }
  .expand-header.open .expand-arrow { transform: rotate(90deg); }
  .expand-body { display: none; flex-wrap: wrap; gap: 6px; padding-top: 4px; }
  .expand-body.open { display: flex; }

  .settings-header {
    display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none;
  }
  .settings-header-left { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.88rem; }
  .settings-summary { font-size: 0.75rem; color: var(--muted); font-weight: 400; }
  .settings-toggle-icon { font-size: 0.75rem; color: var(--muted); transition: transform .2s; }
  .settings-toggle-icon.open { transform: rotate(180deg); }
  .settings-body { display: flex; flex-direction: column; gap: 14px; }
  .settings-body.closed { display: none; }

  .setting-row label { font-size: 0.75rem; font-weight: 700; color: var(--muted); display: block; margin-bottom: 6px; }
  .btn-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .btn-group button {
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border);
    background: #fff; font-size: 0.8rem; cursor: pointer; color: var(--text); transition: all .15s;
  }
  .btn-group button:hover { border-color: var(--blue); color: var(--blue); }
  .btn-group button.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .template-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .template-card {
    padding: 8px 6px; border: 1.5px solid var(--border); border-radius: 8px;
    text-align: center; cursor: pointer; font-size: 0.78rem; background: #fff; transition: all .15s;
  }
  .template-card:hover { border-color: var(--blue); }
  .template-card.active { border-color: var(--blue); background: #eff6ff; color: var(--blue-dark); }
  .template-card .tc-icon { font-size: 1.1rem; margin-bottom: 2px; }
  .template-card .tc-label { font-weight: 700; font-size: 0.75rem; }
  .template-card .tc-desc { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }

  .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .result-header span { font-size: 0.8rem; font-weight: 700; color: var(--blue-dark); }
  .result-actions { display: flex; gap: 6px; }
  .result-actions button {
    padding: 5px 10px; border-radius: 7px; border: 1.5px solid var(--border);
    background: #fff; font-size: 0.75rem; cursor: pointer; color: var(--text); transition: all .15s;
  }
  .result-actions button:hover { border-color: var(--blue); color: var(--blue); }
  #resultText {
    width: 100%; min-height: 160px; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 12px; font-size: 0.88rem; font-family: inherit; color: var(--text);
    resize: vertical; line-height: 1.7; outline: none;
  }
  #resultText:focus { border-color: var(--blue); }
  .result-bottom { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .result-bottom button {
    padding: 6px 12px; border-radius: 8px; border: 1.5px solid var(--border);
    background: #fff; font-size: 0.78rem; cursor: pointer; color: var(--text); transition: all .15s;
  }
  .result-bottom button:hover { border-color: var(--blue); color: var(--blue); }
  #saveBtn { background: var(--blue); color: #fff; border-color: var(--blue); font-weight: 700; }
  #saveBtn:hover { background: var(--blue-dark); }

  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;
    font-size: 0.8rem; cursor: pointer; transition: border-color .15s;
  }
  .history-item:hover { border-color: var(--blue); }
  .history-meta { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
  .history-preview { overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: var(--text); }
  .no-history { font-size: 0.8rem; color: var(--muted); text-align: center; padding: 8px 0; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 99px;
    font-size: 0.85rem; transition: transform .3s; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  #modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    align-items: center; justify-content: center; z-index: 100; padding: 20px;
  }
  #modal.open { display: flex; }
  .modal-box {
    background: #fff; border-radius: var(--radius); padding: 22px; max-width: 480px;
    width: 100%; max-height: 80vh; overflow-y: auto;
  }
  .modal-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
  #modalText { white-space: pre-wrap; font-size: 0.88rem; line-height: 1.7; color: var(--text); }
  .modal-close { margin-top: 16px; width: 100%; padding: 10px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }

  .section-title { font-size: 0.85rem; font-weight: 800; color: var(--text); margin-bottom: 2px; }
  .divider { height: 1px; background: var(--border); margin: 6px 0; }
  .settings-top-spacer { margin-top: 14px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="app-header">
    <h1>📋 석암 알림봇</h1>
    <p>AI가 알림장을 완성해 드려요</p>
  </div>

  <!-- Hero input -->
  <div class="card">
    <div class="hero-label">오늘 알림장에 담을 내용을 입력하세요</div>
    <div class="textarea-wrap">
      <textarea id="mainInput" placeholder="떠오르는 대로 입력하세요…"></textarea>
      <button id="clearBtn" title="지우기">✕</button>
    </div>
    <div class="char-count"><span id="charCount">0</span>자</div>
    <div style="display:flex;gap:8px;margin-top:10px;">
      <input id="teacherName" placeholder="담임 선생님 이름 (선택)" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem;outline:none;">
      <input id="className" placeholder="학급 이름 (선택)" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:0.82rem;outline:none;">
    </div>
    <button id="generateBtn" style="margin-top:12px;">✨ 알림장 생성</button>
  </div>

  <!-- Recommendations -->
  <div class="card rec-section">
    <div class="section-title">💡 키워드 추천</div>
    <div class="divider"></div>

    <div class="rec-block">
      <div class="rec-block-title">🔥 트렌딩 (최근 7일)</div>
      <div id="trendingPills" class="pills">
        <span id="trendingEmpty" style="font-size:0.78rem;color:var(--muted);display:none;">아직 데이터가 없어요</span>
      </div>
    </div>

    <div class="rec-block" id="personalBlock" style="display:none;">
      <div class="rec-block-title">⭐ 내가 자주 쓰는</div>
      <div id="personalPills" class="pills"></div>
    </div>

    <div class="rec-block">
      <div class="rec-block-title">📌 상황별 추천</div>
      <div class="expand-group" id="catGroup"></div>
    </div>

    <div class="rec-block">
      <div class="rec-block-title">📚 과목별 추천</div>
      <div class="expand-group" id="subjectGroup"></div>
    </div>
  </div>

  <!-- Settings accordion -->
  <div class="card" id="settingsCard">
    <div class="settings-header" id="settingsToggle">
      <div class="settings-header-left">
        ⚙️ 설정
        <span class="settings-summary" id="settingsSummary"></span>
      </div>
      <span class="settings-toggle-icon" id="settingsArrow">▲</span>
    </div>
    <div class="settings-body settings-top-spacer" id="settingsBody">
      <div class="setting-row">
        <label>학년</label>
        <div class="btn-group" id="gradeGroup">
          <button data-v="초등학교 1~2학년">1~2학년</button>
          <button data-v="초등학교 3~4학년">3~4학년</button>
          <button data-v="초등학교 5~6학년">5~6학년</button>
          <button data-v="초등학교">전체</button>
        </div>
      </div>
      <div class="setting-row">
        <label>문체 스타일</label>
        <div class="template-grid" id="templateGrid">
          <div class="template-card" data-v="기본"><div class="tc-icon">📝</div><div class="tc-label">기본</div><div class="tc-desc">자연스러운 문장</div></div>
          <div class="template-card" data-v="목록형"><div class="tc-icon">📋</div><div class="tc-label">목록형</div><div class="tc-desc">번호 리스트</div></div>
          <div class="template-card" data-v="핵심만"><div class="tc-icon">⚡</div><div class="tc-label">핵심만</div><div class="tc-desc">짧고 간결</div></div>
          <div class="template-card" data-v="친근한"><div class="tc-icon">😊</div><div class="tc-label">친근한</div><div class="tc-desc">이모지 풍부</div></div>
          <div class="template-card" data-v="공식적"><div class="tc-icon">📜</div><div class="tc-label">공식적</div><div class="tc-desc">공문 형식</div></div>
          <div class="template-card" data-v="감성적"><div class="tc-icon">🌸</div><div class="tc-label">감성적</div><div class="tc-desc">따뜻한 어투</div></div>
        </div>
      </div>
      <div class="setting-row">
        <label>길이</label>
        <div class="btn-group" id="lengthGroup">
          <button data-v="짧게">짧게</button>
          <button data-v="중간">중간</button>
          <button data-v="길게">길게</button>
        </div>
      </div>
      <div class="setting-row">
        <label>인사말 위치</label>
        <div class="btn-group" id="positionGroup">
          <button data-v="맨 위">맨 위</button>
          <button data-v="맨 아래">맨 아래</button>
          <button data-v="둘 다">둘 다</button>
        </div>
      </div>
      <div class="setting-row">
        <label>인사말 아이콘</label>
        <div class="btn-group" id="iconGroup">
          <button data-v="없음">없음</button>
          <button data-v="🌸">🌸</button>
          <button data-v="😊">😊</button>
          <button data-v="📢">📢</button>
          <button data-v="🌟">🌟</button>
          <button data-v="👋">👋</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="result-header">
      <span>✅ 생성된 알림장</span>
      <div class="result-actions">
        <button id="copyBtn">📋 복사</button>
        <button id="previewBtn">👁 미리보기</button>
      </div>
    </div>
    <textarea id="resultText" spellcheck="false"></textarea>
    <div class="result-bottom">
      <button id="regenBtn">🔄 다시 생성</button>
      <button id="longerBtn">📏 더 길게</button>
      <button id="shorterBtn">✂️ 더 짧게</button>
      <button id="toneBtn">🎨 문체 바꾸기</button>
      <button id="saveBtn">💾 저장</button>
    </div>
  </div>

  <!-- Today's history -->
  <div class="card" id="historyCard">
    <div class="section-title" style="margin-bottom:10px;">📅 오늘 저장된 알림장</div>
    <div class="history-list" id="historyList">
      <div class="no-history">아직 저장된 알림장이 없어요.</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<div id="modal">
  <div class="modal-box">
    <h3>알림장 미리보기</h3>
    <div id="modalText"></div>
    <button class="modal-close" id="modalClose">닫기</button>
  </div>
</div>

<script>
const ls  = k => localStorage.getItem(k);
const lsS = (k, v) => localStorage.setItem(k, v);

let selectedGrade    = ls('alrimbot_grade')    || '초등학교 3~4학년';
let selectedStyle    = ls('alrimbot_style')    || '기본';
let greetingLength   = ls('alrimbot_length')   || '중간';
let greetingPosition = ls('alrimbot_position') || '맨 위';
let greetingIcon     = ls('alrimbot_icon')     || '없음';
const activeKws = new Set();

/* rotating placeholder */
const PLACEHOLDERS = [
  '떠오르는 대로 입력하세요…',
  '예: 숙제 리코더 3번 연습',
  '예: 내일 안전 하교 당부',
  '예: 칭찬 발표 아주 잘함',
  '예: 체험학습 동의서 제출',
  '아무거나 입력하면 AI가 정리해요 😊',
];
let phIdx = 0;
const mainInput = document.getElementById('mainInput');
setInterval(() => {
  if (!mainInput.value) mainInput.placeholder = PLACEHOLDERS[phIdx++ % PLACEHOLDERS.length];
}, 3000);

/* category keywords */
const CATS = [
  { label: '📝 숙제·과제',    kws: ['숙제 확인','일기 쓰기','독서 기록','받아쓰기 연습','수학 문제집','발표 준비','포트폴리오','탐구 보고서','조사 과제','프로젝트 제출'] },
  { label: '🎒 준비물',       kws: ['준비물 챙기기','체육복','실내화','물통','간식','우산','색연필','가위풀','스케치북','악기'] },
  { label: '🏥 건강·안전',    kws: ['안전 귀가','마스크 착용','손 씻기','건강 상태 확인','약 지참','충분한 수면','규칙적 식사','안전한 등하교','유행성 질환 주의','체온 체크'] },
  { label: '📅 행사·일정',    kws: ['운동회','학예회','현장체험학습','소풍','방학식','개학식','학부모 상담','공개수업','사진 촬영','졸업식'] },
  { label: '💌 가정통신문',   kws: ['가정통신문 제출','동의서 서명','수련활동 신청','급식 신청','방과후 신청','기초학력 검사','설문 참여','수업료 납부','교육비 지원 신청','학교생활기록부'] },
  { label: '🌟 칭찬·격려',    kws: ['칭찬 릴레이','발표 잘함','협동심 훌륭','친절한 행동','청소 성실','수업 집중','독서 꾸준히','과제 성실','배려심 높음','성장 눈에 띔'] },
  { label: '🍱 급식·간식',    kws: ['급식 잔반 줄이기','편식 개선','알레르기 주의','간식 지참 안내','급식 메뉴 변경','급식 시간 준수','식사 예절','물 충분히','채소 골고루','점심 도시락'] },
  { label: '📚 도서관·독서',  kws: ['도서 반납','신간 추천','독서록 작성','독서 퀴즈','책 가져오기','도서관 이용','독서 마라톤','추천 도서 목록','책 읽기 습관','북토크'] },
  { label: '🏃 체육·활동',    kws: ['체육복 착용','운동화 준비','줄넘기 연습','수영 수업','야외 활동','구기 종목','체력 측정','안전 주의','스트레칭','협동 경기'] },
  { label: '🌴 방학·특별',    kws: ['방학 과제','방학 생활 계획','보충 학습','캠프 신청','방학 중 생활 지도','안전한 방학','독서 권장','규칙적 생활','개학 준비물','방학 숙제'] },
];

const SUBJECTS = [
  { label: '🇰🇷 국어', kws: ['받아쓰기','독서감상문','시 낭송','일기 쓰기','글짓기','맞춤법 연습','국어 교과서','토론','발표','독서록'] },
  { label: '🔢 수학', kws: ['수학 문제집','구구단','분수','도형','측정','사칙연산','통계','수학 익힘책','계산 연습','수학 오답 정리'] },
  { label: '🌍 사회', kws: ['사회 교과서','지도 그리기','역사 공부','사회 탐구','문화재 조사','뉴스 읽기','시민 의식','환경 보호','지역 사회','우리나라 역사'] },
  { label: '🔬 과학', kws: ['과학 실험','관찰 일지','과학 교과서','탐구 활동','생물 관찰','식물 기르기','날씨 관찰','물질 실험','우주 공부','환경 탐구'] },
  { label: '🇺🇸 영어', kws: ['영어 단어 암기','영어 교과서','영어 듣기','영어 말하기','영어 받아쓰기','영어 독서','알파벳','영어 노래','영어 동화','영어 발표'] },
  { label: '🎵 음악', kws: ['리코더 연습','악기 가져오기','노래 연습','합창','리듬 악기','음악 감상','악보 챙기기','가창 발표','음악 교과서','박자 연습'] },
  { label: '🎨 미술', kws: ['미술 준비물','스케치북','색연필','물감','만들기 재료','미술 작품','크레파스','찰흙','붓과 팔레트','미술 전시'] },
  { label: '⚽ 체육', kws: ['체육복','운동화','줄넘기','공 가져오기','야외 수업','수영 준비물','체력 측정','안전 주의','스포츠 활동','구기 종목'] },
];

/* build expandable pill groups */
function buildExpandGroup(containerId, data) {
  const container = document.getElementById(containerId);
  data.forEach(({ label, kws }) => {
    const wrapper = document.createElement('div');
    const header  = document.createElement('div');
    header.className = 'expand-header';
    header.innerHTML = `<span class="expand-arrow">▶</span><span>${label}</span>`;
    const body = document.createElement('div');
    body.className = 'expand-body';
    kws.forEach(kw => body.appendChild(makePill(kw)));
    header.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      header.classList.toggle('open', open);
    });
    wrapper.appendChild(header);
    wrapper.appendChild(body);
    container.appendChild(wrapper);
  });
}
buildExpandGroup('catGroup',     CATS);
buildExpandGroup('subjectGroup', SUBJECTS);

function makePill(kw, extraClass = '') {
  const el = document.createElement('button');
  el.className = 'pill' + (extraClass ? ' ' + extraClass : '');
  el.textContent = kw;
  el.dataset.kw  = kw;
  el.addEventListener('click', () => toggleKw(kw));
  return el;
}

function escapeReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function toggleKw(kw) {
  if (activeKws.has(kw)) {
    activeKws.delete(kw);
    mainInput.value = mainInput.value
      .replace(new RegExp('(?:^|\\s)' + escapeReg(kw) + '(?=\\s|$)', 'g'), ' ')
      .trim();
  } else {
    activeKws.add(kw);
    mainInput.value = (mainInput.value ? mainInput.value.trimEnd() + ' ' : '') + kw;
  }
  updateAllKwPills();
  updateCharCount();
}

function updateAllKwPills() {
  document.querySelectorAll('.pill[data-kw]').forEach(el => {
    el.classList.toggle('active', activeKws.has(el.dataset.kw));
  });
}

/* char count & clear */
const charCountEl = document.getElementById('charCount');
const clearBtn    = document.getElementById('clearBtn');
function updateCharCount() {
  charCountEl.textContent = mainInput.value.length;
  clearBtn.style.display  = mainInput.value ? 'block' : 'none';
}
mainInput.addEventListener('input', () => {
  updateCharCount();
  const val = mainInput.value;
  [...activeKws].forEach(kw => { if (!val.includes(kw)) activeKws.delete(kw); });
  updateAllKwPills();
  lsS('alrimbot_free_text', val);
});
clearBtn.addEventListener('click', () => {
  mainInput.value = '';
  activeKws.clear();
  updateCharCount();
  updateAllKwPills();
  lsS('alrimbot_free_text', '');
});
const savedText = ls('alrimbot_free_text');
if (savedText) { mainInput.value = savedText; updateCharCount(); }

/* settings accordion */
const firstVisit = !ls('alrimbot_initialized');
if (firstVisit) lsS('alrimbot_initialized', 'true');
let settingsOpen = ls('alrimbot_settings_open') !== null
  ? ls('alrimbot_settings_open') === 'true'
  : firstVisit;

function applySettingsOpen() {
  const body  = document.getElementById('settingsBody');
  const arrow = document.getElementById('settingsArrow');
  if (settingsOpen) {
    body.classList.remove('closed');
    arrow.classList.add('open');
  } else {
    body.classList.add('closed');
    arrow.classList.remove('open');
  }
  updateSettingsSummary();
}

document.getElementById('settingsToggle').addEventListener('click', () => {
  settingsOpen = !settingsOpen;
  lsS('alrimbot_settings_open', settingsOpen);
  applySettingsOpen();
});

function updateSettingsSummary() {
  const gradeShort = selectedGrade.replace('초등학교 ', '').replace('초등학교', '전체');
  document.getElementById('settingsSummary').textContent =
    settingsOpen ? '' : `${gradeShort} · ${selectedStyle} · ${greetingLength}`;
}

/* settings sync */
function syncUI() {
  document.querySelectorAll('#gradeGroup button').forEach(b =>
    b.classList.toggle('active', b.dataset.v === selectedGrade));
  document.querySelectorAll('#templateGrid .template-card').forEach(c =>
    c.classList.toggle('active', c.dataset.v === selectedStyle));
  document.querySelectorAll('#lengthGroup button').forEach(b =>
    b.classList.toggle('active', b.dataset.v === greetingLength));
  document.querySelectorAll('#positionGroup button').forEach(b =>
    b.classList.toggle('active', b.dataset.v === greetingPosition));
  document.querySelectorAll('#iconGroup button').forEach(b =>
    b.classList.toggle('active', b.dataset.v === greetingIcon));
  updateSettingsSummary();
}

document.getElementById('gradeGroup').addEventListener('click', e => {
  const v = e.target.dataset.v; if (!v) return;
  selectedGrade = v; lsS('alrimbot_grade', v); syncUI();
});
document.getElementById('templateGrid').addEventListener('click', e => {
  const card = e.target.closest('.template-card'); if (!card) return;
  selectedStyle = card.dataset.v; lsS('alrimbot_style', selectedStyle); syncUI();
});
document.getElementById('lengthGroup').addEventListener('click', e => {
  const v = e.target.dataset.v; if (!v) return;
  greetingLength = v; lsS('alrimbot_length', v); syncUI();
});
document.getElementById('positionGroup').addEventListener('click', e => {
  const v = e.target.dataset.v; if (!v) return;
  greetingPosition = v; lsS('alrimbot_position', v); syncUI();
});
document.getElementById('iconGroup').addEventListener('click', e => {
  const v = e.target.dataset.v; if (!v) return;
  greetingIcon = v; lsS('alrimbot_icon', v); syncUI();
});

syncUI();
applySettingsOpen();

/* restore teacher/class */
const teacherInput = document.getElementById('teacherName');
const classInput   = document.getElementById('className');
teacherInput.value = ls('alrimbot_teacher') || '';
classInput.value   = ls('alrimbot_class')   || '';
teacherInput.addEventListener('input', () => lsS('alrimbot_teacher', teacherInput.value));
classInput.addEventListener('input',   () => lsS('alrimbot_class',   classInput.value));

/* trending */
async function loadTrending() {
  try {
    const res = await fetch('/api/trending');
    const { data } = await res.json();
    const container = document.getElementById('trendingPills');
    const empty     = document.getElementById('trendingEmpty');
    if (!data || data.length === 0) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    data.forEach(({ keyword }) => container.appendChild(makePill(keyword, 'trending')));
  } catch (_) {}
}
loadTrending();

/* personal keywords */
function loadPersonalKws() {
  const p      = JSON.parse(ls('alrimbot_personal_kw') || '{}');
  const sorted = Object.entries(p).sort(([, a], [, b]) => b - a).slice(0, 10).map(([k]) => k);
  const block  = document.getElementById('personalBlock');
  const cont   = document.getElementById('personalPills');
  cont.innerHTML = '';
  if (sorted.length === 0) { block.style.display = 'none'; return; }
  block.style.display = '';
  sorted.forEach(kw => cont.appendChild(makePill(kw)));
  updateAllKwPills();
}
loadPersonalKws();

function extractKeywords(text) {
  return text
    .split(/[\s,，.。·\n]+/)
    .map(t => t.trim())
    .filter(t => t.length >= 2 && t.length <= 20);
}

function trackPersonalKws(kws) {
  const p = JSON.parse(ls('alrimbot_personal_kw') || '{}');
  kws.forEach(k => { p[k] = (p[k] || 0) + 1; });
  lsS('alrimbot_personal_kw', JSON.stringify(p));
  loadPersonalKws();
}

async function sendUsage(text) {
  const kws = extractKeywords(text);
  trackPersonalKws(kws);
  fetch('/api/usage', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ keywords: kws }),
  }).catch(() => {});
}

/* generate */
async function callGenerate(overrideLength) {
  const freeText = mainInput.value.trim();
  if (!freeText) { showToast('내용을 입력해주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled    = true;
  btn.textContent = '생성 중…';

  const payload = {
    freeText,
    teacherName:      teacherInput.value.trim(),
    className:        classInput.value.trim(),
    grade:            selectedGrade,
    style:            selectedStyle,
    greetingLength:   overrideLength || greetingLength,
    greetingPosition: greetingPosition,
    greetingIcon:     greetingIcon,
  };

  try {
    const res  = await fetch('/api/generate-free', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error || '오류');

    document.getElementById('resultText').value = json.text;
    document.getElementById('resultCard').style.display = '';
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    sendUsage(freeText);
  } catch (err) {
    showToast('오류: ' + err.message);
  } finally {
    btn.disabled    = false;
    btn.textContent = '✨ 알림장 생성';
  }
}

document.getElementById('generateBtn').addEventListener('click', () => callGenerate());
document.getElementById('regenBtn').addEventListener('click',    () => callGenerate());
document.getElementById('longerBtn').addEventListener('click',   () => callGenerate('길게'));
document.getElementById('shorterBtn').addEventListener('click',  () => callGenerate('짧게'));
document.getElementById('toneBtn').addEventListener('click', () => {
  const STYLES = ['기본', '목록형', '핵심만', '친근한', '공식적', '감성적'];
  const idx = STYLES.indexOf(selectedStyle);
  selectedStyle = STYLES[(idx + 1) % STYLES.length];
  lsS('alrimbot_style', selectedStyle);
  syncUI();
  callGenerate();
});

/* copy */
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('resultText').value;
  navigator.clipboard.writeText(text)
    .then(() => showToast('클립보드에 복사했어요!'))
    .catch(() => {
      document.getElementById('resultText').select();
      document.execCommand('copy');
      showToast('복사됨');
    });
});

/* preview modal */
document.getElementById('previewBtn').addEventListener('click', () => {
  document.getElementById('modalText').textContent = document.getElementById('resultText').value;
  document.getElementById('modal').classList.add('open');
});
document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal'))
    document.getElementById('modal').classList.remove('open');
});

/* save */
document.getElementById('saveBtn').addEventListener('click', async () => {
  const generated = document.getElementById('resultText').value;
  if (!generated) return;
  try {
    const res  = await fetch('/api/alrim', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        teacher_name:   teacherInput.value.trim() || null,
        class_name:     classInput.value.trim()   || null,
        topics:         null,
        generated_text: generated,
        edited_text:    generated,
      }),
    });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error);
    showToast('저장됐어요! 💾');
    loadHistory();
  } catch (err) {
    showToast('저장 오류: ' + err.message);
  }
});

/* history */
async function loadHistory() {
  const list = document.getElementById('historyList');
  try {
    const res  = await fetch('/api/alrim');
    const json = await res.json();
    if (!json.data || json.data.length === 0) {
      list.innerHTML = '<div class="no-history">아직 저장된 알림장이 없어요.</div>';
      return;
    }
    list.innerHTML = '';
    json.data.forEach(item => {
      const el      = document.createElement('div');
      el.className  = 'history-item';
      const preview = (item.edited_text || item.generated_text || '').slice(0, 60);
      const time    = item.created_at ? item.created_at.slice(11, 16) : '';
      el.innerHTML  = `<div class="history-meta">${item.teacher_name || '선생님'} · ${item.class_name || ''} · ${time}</div><div class="history-preview">${preview}…</div>`;
      el.addEventListener('click', () => {
        document.getElementById('resultText').value = item.edited_text || item.generated_text;
        document.getElementById('resultCard').style.display = '';
        document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
      });
      list.appendChild(el);
    });
  } catch (_) {
    list.innerHTML = '<div class="no-history">불러오기 실패</div>';
  }
}
loadHistory();

/* toast */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
