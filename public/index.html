<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>석암 알림봇</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #3b82f6; --blue-d: #2563eb; --blue-l: #eff6ff;
  --mint: #10b981; --mint-l: #ecfdf5;
  --amber: #f59e0b; --amber-l: #fffbeb;
  --red: #ef4444;  --red-l: #fef2f2;
  --bg: #f0f4ff; --card: #fff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b;
  --radius: 14px;
}
body { font-family: 'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:12px 16px 60px; }
.container { max-width:640px; margin:0 auto; display:flex; flex-direction:column; gap:12px; }

/* ── banners ── */
.banner { border-radius:10px; padding:10px 14px; font-size:.82rem; font-weight:700; display:flex; align-items:center; gap:8px; }
.banner-special { background:linear-gradient(135deg,#fde68a,#fbbf24); color:#78350f; }
.banner-dday    { background:linear-gradient(135deg,#bfdbfe,#93c5fd); color:#1e40af; }
.banner-weather { background:var(--card); border:1px solid var(--border); color:var(--text); font-weight:400; }
.banner-weather strong { font-weight:700; }
.banner-weather .w-sugg { display:inline-flex; gap:5px; margin-left:6px; }
.banner-weather .w-tag  { background:var(--blue-l); color:var(--blue-d); border-radius:99px; padding:2px 8px; font-size:.74rem; font-weight:600; cursor:pointer; }
.banner-weather .w-tag:hover { background:var(--blue); color:#fff; }
.banner-close { margin-left:auto; background:none; border:none; cursor:pointer; font-size:.9rem; opacity:.6; }

/* ── header ── */
.app-header { text-align:center; padding:14px 0 2px; }
.app-header h1 { font-size:1.4rem; font-weight:800; color:var(--blue-d); letter-spacing:-.5px; }
.app-header p  { font-size:.8rem; color:var(--muted); margin-top:2px; }

/* ── card ── */
.card { background:var(--card); border-radius:var(--radius); border:1px solid var(--border); padding:16px; box-shadow:0 1px 4px rgba(0,0,0,.05); }

/* ── hero ── */
.hero-label { font-size:.76rem; font-weight:700; color:var(--blue-d); margin-bottom:6px; }
.textarea-wrap { position:relative; }
#mainInput {
  width:100%; min-height:108px; border:2px solid var(--border); border-radius:10px;
  padding:11px 34px 11px 11px; font-size:.93rem; font-family:inherit; color:var(--text);
  resize:vertical; outline:none; transition:border-color .2s; line-height:1.65;
}
#mainInput:focus { border-color:var(--blue); }
#clearBtn { position:absolute; top:9px; right:9px; background:none; border:none; font-size:1rem; cursor:pointer; color:#aaa; display:none; }
.char-count { font-size:.7rem; color:var(--muted); text-align:right; margin-top:3px; }
.info-row { display:flex; gap:8px; margin-top:9px; }
.info-row input { flex:1; padding:7px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:.82rem; outline:none; font-family:inherit; }
.info-row input:focus { border-color:var(--blue); }

/* ── quick options ── */
.qo-card { display:flex; flex-direction:column; gap:10px; }
.qo-row { display:flex; align-items:flex-start; gap:10px; }
.qo-label { font-size:.72rem; font-weight:700; color:var(--muted); white-space:nowrap; padding-top:6px; min-width:46px; }
.qo-group { display:flex; flex-wrap:wrap; gap:5px; }
.qo-group button {
  padding:5px 10px; border-radius:8px; border:1.5px solid var(--border);
  background:#fff; font-size:.78rem; cursor:pointer; color:var(--text); transition:all .15s;
}
.qo-group button:hover  { border-color:var(--blue); color:var(--blue); }
.qo-group button.active { background:var(--blue); color:#fff; border-color:var(--blue); }

/* ── generate button ── */
#generateBtn {
  width:100%; padding:14px; background:var(--blue); color:#fff; border:none;
  border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; transition:background .2s, transform .1s;
}
#generateBtn:hover    { background:var(--blue-d); }
#generateBtn:active   { transform:scale(.98); }
#generateBtn:disabled { background:#94a3b8; cursor:not-allowed; }

/* ── recommendations ── */
.rec-section { display:flex; flex-direction:column; gap:11px; }
.section-title { font-size:.84rem; font-weight:800; color:var(--text); }
.divider { height:1px; background:var(--border); margin:4px 0; }
.rec-block-title { font-size:.75rem; font-weight:700; color:var(--muted); margin-bottom:6px; }
.pills { display:flex; flex-wrap:wrap; gap:5px; }
.pill {
  padding:4px 10px; border-radius:99px; border:1.5px solid var(--border);
  font-size:.78rem; background:var(--blue-l); color:var(--text); cursor:pointer; user-select:none; transition:all .15s;
}
.pill:hover  { border-color:var(--blue); color:var(--blue); }
.pill.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.pill.seasonal { background:var(--amber-l); border-color:#fcd34d; }
.pill.seasonal.active { background:var(--amber); border-color:var(--amber); color:#fff; }
.pill.supply  { background:var(--mint-l);  border-color:#6ee7b7; }
.pill.supply.active  { background:var(--mint);  border-color:var(--mint); color:#fff; }

.expand-group { display:flex; flex-direction:column; gap:7px; }
.expand-header { display:flex; align-items:center; gap:6px; cursor:pointer; font-size:.78rem; font-weight:700; color:var(--muted); user-select:none; }
.expand-arrow  { font-size:.68rem; transition:transform .2s; }
.expand-header.open .expand-arrow { transform:rotate(90deg); }
.expand-body   { display:none; flex-wrap:wrap; gap:5px; padding-top:4px; }
.expand-body.open { display:flex; }

/* ── settings accordion ── */
.settings-header { display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; }
.settings-header-left { display:flex; align-items:center; gap:8px; font-weight:700; font-size:.86rem; }
.settings-summary { font-size:.73rem; color:var(--muted); font-weight:400; }
.settings-arrow   { font-size:.72rem; color:var(--muted); transition:transform .2s; }
.settings-arrow.open { transform:rotate(180deg); }
.settings-body { display:flex; flex-direction:column; gap:13px; padding-top:14px; }
.settings-body.closed { display:none; }
.setting-row label { font-size:.73rem; font-weight:700; color:var(--muted); display:block; margin-bottom:5px; }
.btn-group { display:flex; flex-wrap:wrap; gap:5px; }
.btn-group button {
  padding:5px 11px; border-radius:8px; border:1.5px solid var(--border);
  background:#fff; font-size:.78rem; cursor:pointer; color:var(--text); transition:all .15s;
}
.btn-group button:hover  { border-color:var(--blue); color:var(--blue); }
.btn-group button.active { background:var(--blue); color:#fff; border-color:var(--blue); }
.template-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
.template-card {
  padding:7px 4px; border:1.5px solid var(--border); border-radius:8px;
  text-align:center; cursor:pointer; font-size:.75rem; background:#fff; transition:all .15s;
}
.template-card:hover { border-color:var(--blue); }
.template-card.active { border-color:var(--blue); background:var(--blue-l); color:var(--blue-d); }
.template-card .tc-icon  { font-size:1rem; margin-bottom:1px; }
.template-card .tc-label { font-weight:700; font-size:.73rem; }

/* school/sig inputs */
.text-input {
  width:100%; padding:7px 10px; border:1.5px solid var(--border); border-radius:8px;
  font-size:.82rem; outline:none; font-family:inherit;
}
.text-input:focus { border-color:var(--blue); }

/* sig presets */
.sig-presets { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:6px; }
.sig-preset {
  padding:4px 10px; border:1.5px solid var(--border); border-radius:99px;
  font-size:.76rem; background:#fff; cursor:pointer; transition:all .15s;
}
.sig-preset:hover  { border-color:var(--blue); }
.sig-preset.active { background:var(--blue); color:#fff; border-color:var(--blue); }

/* D-Day manager */
.dday-form { display:flex; gap:6px; margin-bottom:8px; }
.dday-form input { flex:1; padding:6px 9px; border:1.5px solid var(--border); border-radius:8px; font-size:.78rem; outline:none; }
.dday-form input:focus { border-color:var(--blue); }
.dday-add-btn { padding:6px 12px; border:none; background:var(--blue); color:#fff; border-radius:8px; font-size:.78rem; cursor:pointer; white-space:nowrap; }
.dday-list { display:flex; flex-direction:column; gap:5px; }
.dday-item { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; border:1px solid var(--border); border-radius:8px; font-size:.78rem; }
.dday-item-name  { font-weight:600; }
.dday-item-date  { color:var(--muted); font-size:.72rem; margin-left:8px; }
.dday-item-del   { background:none; border:none; cursor:pointer; color:#aaa; font-size:.9rem; }
.dday-item-del:hover { color:var(--red); }

/* toggle row */
.toggle-row { display:flex; align-items:center; justify-content:space-between; }
.toggle-row label { font-size:.78rem; color:var(--text); cursor:pointer; }
.toggle { position:relative; display:inline-block; width:38px; height:22px; }
.toggle input { opacity:0; width:0; height:0; }
.toggle-slider { position:absolute; inset:0; background:#cbd5e1; border-radius:99px; transition:.2s; cursor:pointer; }
.toggle-slider::before { content:''; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
.toggle input:checked + .toggle-slider { background:var(--blue); }
.toggle input:checked + .toggle-slider::before { transform:translateX(16px); }

/* ── result ── */
.result-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
.result-header span { font-size:.8rem; font-weight:700; color:var(--blue-d); }
#resultText {
  width:100%; min-height:160px; border:1.5px solid var(--border); border-radius:8px;
  padding:11px; font-size:.87rem; font-family:inherit; color:var(--text); resize:vertical; line-height:1.7; outline:none;
}
#resultText:focus { border-color:var(--blue); }
.result-btn-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
.result-btn-row button {
  padding:5px 11px; border-radius:8px; border:1.5px solid var(--border);
  background:#fff; font-size:.76rem; cursor:pointer; color:var(--text); transition:all .15s;
}
.result-btn-row button:hover  { border-color:var(--blue); color:var(--blue); }
.result-btn-row button:disabled { opacity:.5; cursor:not-allowed; }
.btn-primary  { background:var(--blue)  !important; color:#fff !important; border-color:var(--blue)  !important; font-weight:700; }
.btn-mint     { background:var(--mint)  !important; color:#fff !important; border-color:var(--mint)  !important; }
.btn-amber    { background:var(--amber) !important; color:#fff !important; border-color:var(--amber) !important; }
.btn-divider  { width:1px; background:var(--border); margin:0 2px; }

/* ── history ── */
.history-list { display:flex; flex-direction:column; gap:7px; }
.history-item { border:1px solid var(--border); border-radius:8px; padding:9px 11px; font-size:.78rem; cursor:pointer; transition:border-color .15s; }
.history-item:hover { border-color:var(--blue); }
.history-meta    { font-size:.7rem; color:var(--muted); margin-bottom:2px; }
.history-preview { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.no-history { font-size:.78rem; color:var(--muted); text-align:center; padding:8px 0; }

/* ── quote ── */
.quote-card { text-align:center; padding:14px; }
.quote-text   { font-size:.83rem; color:var(--text); line-height:1.6; font-style:italic; }
.quote-author { font-size:.72rem; color:var(--muted); margin-top:5px; }

/* ── toast ── */
#toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(70px);
  background:#1e293b; color:#fff; padding:9px 18px; border-radius:99px;
  font-size:.83rem; transition:transform .3s; pointer-events:none; white-space:nowrap; z-index:999;
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* ── modal ── */
#modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); align-items:center; justify-content:center; z-index:100; padding:20px; }
#modal.open { display:flex; }
.modal-box { background:#fff; border-radius:var(--radius); padding:20px; max-width:460px; width:100%; max-height:80vh; overflow-y:auto; }
.modal-box h3 { font-size:.98rem; font-weight:700; margin-bottom:11px; }
#modalText { white-space:pre-wrap; font-size:.86rem; line-height:1.75; }
.modal-close { margin-top:14px; width:100%; padding:10px; background:var(--blue); color:#fff; border:none; border-radius:8px; font-size:.9rem; cursor:pointer; }

/* ── print card (hidden, for html2canvas) ── */
#printCard {
  display:none; position:fixed; left:-9999px; top:0;
  width:600px; background:#fff; padding:36px 40px; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  border:2px solid #e2e8f0;
}
.pc-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; border-bottom:2px solid var(--blue); padding-bottom:12px; }
.pc-school  { font-size:1rem; font-weight:800; color:var(--blue-d); }
.pc-date    { font-size:.82rem; color:var(--muted); }
.pc-title   { font-size:1.2rem; font-weight:800; text-align:center; margin-bottom:16px; color:var(--text); }
.pc-content { font-size:.9rem; line-height:1.8; white-space:pre-wrap; color:var(--text); }
.pc-sig     { margin-top:20px; text-align:right; font-size:.82rem; color:var(--muted); white-space:pre-wrap; }
.pc-footer  { margin-top:16px; text-align:center; font-size:.68rem; color:#cbd5e1; }
.pc-trans-wrap  { margin-top:18px; border-top:1.5px solid #e2e8f0; padding-top:14px; }
.pc-trans-label { font-size:.74rem; font-weight:700; color:#64748b; margin-bottom:6px; }
.pc-trans-body  { font-size:.86rem; line-height:1.8; white-space:pre-wrap; color:#1e293b; }

/* ── 번역 ── */
.translate-wrap { position:relative; display:inline-block; }
.translate-menu {
  position:absolute; bottom:calc(100% + 7px); right:0; background:#fff;
  border:1.5px solid var(--border); border-radius:10px;
  box-shadow:0 4px 18px rgba(0,0,0,.13); z-index:60; min-width:200px; padding:5px;
}
.translate-menu button {
  display:block; width:100%; padding:7px 12px; text-align:left; border:none;
  background:none; border-radius:7px; font-size:.8rem; cursor:pointer; color:var(--text); transition:background .15s;
}
.translate-menu button:hover { background:var(--blue-l); color:var(--blue-d); }
.trans-card { border:1.5px solid var(--border); border-radius:10px; overflow:hidden; animation:fadeIn .22s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
.trans-card-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; background:var(--blue-l); }
.trans-card-lang { font-size:.79rem; font-weight:700; color:var(--blue-d); }
.trans-card-actions { display:flex; gap:4px; align-items:center; }
.trans-card-actions button { padding:3px 8px; border:1.5px solid var(--blue); border-radius:6px; background:#fff; font-size:.71rem; cursor:pointer; color:var(--blue-d); transition:all .15s; }
.trans-card-actions button:hover { background:var(--blue); color:#fff; }
.trans-card-del { border:none !important; background:none !important; color:#bbb !important; padding:2px 5px !important; }
.trans-card-del:hover { color:var(--red) !important; background:none !important; }
.trans-card-body { padding:11px 13px; font-size:.85rem; line-height:1.75; color:var(--text); white-space:pre-wrap; }
.trans-card-loading { padding:14px; font-size:.8rem; color:var(--muted); display:flex; align-items:center; justify-content:center; gap:8px; }
.spinner { width:15px; height:15px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }
#translatePanel { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
</style>
</head>
<body>

<!-- Print card (hidden, html2canvas용) -->
<div id="printCard">
  <div class="pc-header">
    <div class="pc-school" id="pcSchool">석암초등학교</div>
    <div class="pc-date"   id="pcDate"></div>
  </div>
  <div class="pc-title">📋 알림장</div>
  <div class="pc-content" id="pcContent"></div>
  <div class="pc-sig" id="pcSig"></div>
  <div id="pcTransWrap" class="pc-trans-wrap" style="display:none;">
    <div class="pc-trans-label" id="pcTransLabel"></div>
    <div class="pc-trans-body"  id="pcTransBody"></div>
  </div>
  <div class="pc-footer">석암 알림봇 · seokam-alrimbot</div>
</div>

<div class="container">

  <!-- 특별한 날 배너 (JS로 조건부 표시) -->
  <div id="specialBanner" class="banner banner-special" style="display:none;">
    <span id="specialBannerText"></span>
    <button class="banner-close" id="specialBannerClose">✕</button>
  </div>

  <!-- D-Day 배너 -->
  <div id="ddayBanner" class="banner banner-dday" style="display:none;">
    <span id="ddayBannerText"></span>
  </div>

  <!-- 날씨 배너 -->
  <div id="weatherBanner" class="banner banner-weather" style="display:none;">
    <span id="weatherInfo"></span>
    <span class="w-sugg" id="weatherSugg"></span>
    <button class="banner-close" id="weatherClose">✕</button>
  </div>

  <!-- 헤더 -->
  <div class="app-header">
    <h1>📋 석암 알림봇</h1>
    <p>AI가 알림장을 완성해 드려요</p>
  </div>

  <!-- 히어로 입력 -->
  <div class="card">
    <div class="hero-label">오늘 알림장에 담을 내용을 입력하세요</div>
    <div class="textarea-wrap">
      <textarea id="mainInput" placeholder="떠오르는 대로 입력하세요…"></textarea>
      <button id="clearBtn" title="지우기">✕</button>
    </div>
    <div class="char-count"><span id="charCount">0</span>자</div>
    <div class="info-row">
      <input id="teacherName" placeholder="담임 선생님 이름 (선택)">
      <input id="className"   placeholder="학급 (선택, 예: 3학년 3반)">
    </div>
  </div>

  <!-- 빠른 옵션 -->
  <div class="card qo-card">
    <div class="qo-row">
      <span class="qo-label">🎨 톤</span>
      <div class="qo-group" id="toneGroup">
        <button data-v="친근한">😊 친근</button>
        <button data-v="공식적">📝 공식</button>
        <button data-v="감성적">❤️ 따뜻</button>
        <button data-v="핵심만">📋 간결</button>
        <button data-v="활기찬">🎉 활기</button>
        <button data-v="기본">🌱 부드러운</button>
      </div>
    </div>
    <div class="qo-row">
      <span class="qo-label">📏 길이</span>
      <div class="qo-group" id="quickLengthGroup">
        <button data-v="짧게">짧게</button>
        <button data-v="중간">중간</button>
        <button data-v="길게">길게</button>
      </div>
    </div>
    <div class="qo-row">
      <span class="qo-label">😊 이모지</span>
      <div class="qo-group" id="emojiLevelGroup">
        <button data-v="많이">🎉 많이</button>
        <button data-v="보통">😊 보통</button>
        <button data-v="없이">❌ 없이</button>
      </div>
    </div>
    <div class="qo-row">
      <span class="qo-label">🗣️ 어투</span>
      <div class="qo-group" id="honorificGroup">
        <button data-v="존댓말">존댓말</button>
        <button data-v="반말">반말</button>
      </div>
    </div>
  </div>

  <!-- 생성 버튼 -->
  <button id="generateBtn">✨ 알림장 생성</button>

  <!-- 추천 키워드 -->
  <div class="card rec-section">
    <div class="section-title">💡 키워드 추천</div>
    <div class="divider"></div>

    <!-- 준비물 자동 제안 (JS 조건부) -->
    <div id="supplyBlock" style="display:none;">
      <div class="rec-block-title">🎒 관련 준비물 제안</div>
      <div id="supplyPills" class="pills"></div>
    </div>

    <!-- 시즌별 키워드 -->
    <div id="seasonalBlock">
      <div class="rec-block-title" id="seasonalTitle"></div>
      <div id="seasonalPills" class="pills"></div>
    </div>

    <!-- 트렌딩 -->
    <div class="rec-block">
      <div class="rec-block-title">🔥 트렌딩 (최근 7일)</div>
      <div id="trendingPills" class="pills">
        <span id="trendingEmpty" style="font-size:.76rem;color:var(--muted);display:none;">아직 데이터가 없어요</span>

/* ── pill 생성 헬퍼 ── */
function makePill(kw, extraClass = '') {
  const el = document.createElement('button');
  el.className = 'pill' + (extraClass ? ' ' + extraClass : '');
  el.textContent = kw;
  el.dataset.kw  = kw;
  el.addEventListener('click', () => toggleKw(kw));
  return el;
}

function escapeReg(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

/* ── 키워드 토글 ── */
function toggleKw(kw) {
  if (activeKws.has(kw)) {
    activeKws.delete(kw);
    mainInput.value = mainInput.value
      .replace(new RegExp('(?:^|\\s)' + escapeReg(kw) + '(?=\\s|$)', 'g'), ' ')
      .trim();
  } else {
    activeKws.add(kw);
    mainInput.value = (mainInput.value ? mainInput.value.trimEnd() + ' ' : '') + kw;
  }
  updateAllPills();
  updateCharCount();
  lsS('alrimbot_free_text', mainInput.value);
  updateSupplyHints();
}

function updateAllPills() {
  document.querySelectorAll('.pill[data-kw]').forEach(el => {
    el.classList.toggle('active', activeKws.has(el.dataset.kw));
  });
}

/* ── 준비물 힌트 ── */
function updateSupplyHints() {
  const text = mainInput.value;
  const found = new Set();
  Object.entries(SUPPLY_MAP).forEach(([kw, supplies]) => {
    if (text.includes(kw)) supplies.forEach(s => found.add(s));
  });
  const block = document.getElementById('supplyBlock');
  const cont  = document.getElementById('supplyPills');
  if (found.size === 0) { block.style.display = 'none'; return; }
  block.style.display = '';
  cont.innerHTML = '';
  found.forEach(s => cont.appendChild(makePill(s, 'supply')));
  updateAllPills();
}

/* ── expand group 생성 ── */
function buildExpandGroup(containerId, data) {
  const container = document.getElementById(containerId);
  data.forEach(({ label, kws }) => {
    const wrapper = document.createElement('div');
    const header  = document.createElement('div');
    header.className = 'expand-header';
    header.innerHTML = `<span class="expand-arrow">▶</span><span>${label}</span>`;
    const body = document.createElement('div');
    body.className = 'expand-body';
    kws.forEach(kw => body.appendChild(makePill(kw)));
    header.addEventListener('click', () => {
      const open = body.classList.toggle('open');
      header.classList.toggle('open', open);
    });
    wrapper.appendChild(header);
    wrapper.appendChild(body);
    container.appendChild(wrapper);
  });
}

function loadPersonalKws() {
  const p      = lsJ('alrimbot_personal_kw') || {};

  const p = lsJ('alrimbot_personal_kw') || {};

function extractKeywords(text) {
  return text.split(/[\s,，.。·\n]+/).map(t => t.trim()).filter(t => t.length >= 2 && t.length <= 20);
}

async function sendUsage(text) {
  const kws = extractKeywords(text);
  trackPersonalKws(kws);
  fetch('/api/usage', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ keywords: kws }) }).catch(() => {});
}

/* ── D-Day ── */
function loadDDay() {
  const events = lsJ('alrimbot_dday') || [];
  const list   = document.getElementById('ddayList');
  list.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  let nearest = null;

  events.forEach((ev, i) => {
    const d  = new Date(ev.date); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (diff >= 0 && (!nearest || diff < nearest.diff)) nearest = { ...ev, diff };

    const item = document.createElement('div');
    item.className = 'dday-item';
    item.innerHTML = `<span><span class="dday-item-name">${ev.name}</span><span class="dday-item-date">${ev.date}${diff >= 0 ? ' (D-' + diff + ')' : ' (완료)'}</span></span>`;
    const del = document.createElement('button');
    del.className = 'dday-item-del';
    del.textContent = '✕';
    del.addEventListener('click', () => {
      const arr = lsJ('alrimbot_dday') || [];
      arr.splice(i, 1);
      lsSJ('alrimbot_dday', arr);
      loadDDay();
    });
    item.appendChild(del);
    list.appendChild(item);
  });

  const banner = document.getElementById('ddayBanner');
  if (nearest) {
    document.getElementById('ddayBannerText').textContent = `🎯 ${nearest.name} D-${nearest.diff}`;
    banner.style.display = '';
  } else {
    banner.style.display = 'none';
  }
}
loadDDay();

document.getElementById('ddayAddBtn').addEventListener('click', () => {
  const name = document.getElementById('ddayName').value.trim();

  if (!name || !date) { showToast('이름과 날짜를 모두 입력해주세요.'); return; }
  const arr = lsJ('alrimbot_dday') || [];

  lsSJ('alrimbot_dday', arr);
  document.getElementById('ddayName').value = '';
  document.getElementById('ddayDate').value = '';
  loadDDay();
});

function buildSignature() {
  if (!document.getElementById('sigToggle').checked) return '';
  const lines = [];
  if (schoolName)            lines.push(schoolName);
  if (classInput.value.trim()) lines.push(classInput.value.trim());
  if (teacherInput.value.trim()) lines.push(teacherInput.value.trim() + ' 드림');
  if (sigPhrase)             lines.push(sigPhrase);
  return lines.length >= 2 ? lines.join('\n') : '';

/* ── 날씨 컨텍스트 ── */
function buildWeatherContext() {
  if (!document.getElementById('weatherToggle').checked || !weatherData) return '';
  const parts = [];
  if (weatherData.weatherLabel) parts.push(weatherData.weatherLabel);
  if (weatherData.temp !== null) parts.push(Math.round(weatherData.temp) + '°C');
  if (weatherData.pm10 !== null) parts.push('미세먼지 ' + weatherData.pm10 + 'μg');
  return parts.join(', ');
}

/* ── 생성 ── */
async function callGenerate(overrideLength) {
  const freeText = mainInput.value.trim();
  if (!freeText) { showToast('내용을 입력해주세요.'); return; }

  const btn = document.getElementById('generateBtn');
  const setLoading = on => { btn.disabled = on; btn.textContent = on ? '✨ 생성 중…' : '✨ 알림장 생성'; };
  setLoading(true);

  try {
    const res  = await fetch('/api/generate-free', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        freeText,
        teacherName:      teacherInput.value.trim(),
        className:        classInput.value.trim(),
        grade:            selectedGrade,
        style:            selectedStyle,
        greetingLength:   overrideLength || greetingLength,
        greetingPosition, greetingIcon,
        emojiLevel,       honorific,
        signature:        buildSignature(),
        weatherContext:   buildWeatherContext(),
      }),
    });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error || `HTTP ${res.status}`);

    // 새 생성 시 이전 번역 초기화
    document.getElementById('translatePanel').innerHTML = '';
    translateCache.clear();
    document.getElementById('resultText').value = json.text;
    document.getElementById('resultCard').style.display = '';
    document.getElementById('resultCard').scrollIntoView({ behavior:'smooth', block:'start' });
    sendUsage(freeText);
  } catch (err) {
    showToast('오류: ' + err.message);
  } finally {
    setLoading(false);
  }
}
document.getElementById('generateBtn').addEventListener('click', () => callGenerate());

  const text = document.getElementById('resultText').value;
  if (!text) return;
  const btn = direction === 'shorter' ? document.getElementById('shorterBtn') : document.getElementById('longerBtn');
  btn.disabled = true;
  try {
    const res  = await fetch('/api/resize', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ text, direction }) });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error || `HTTP ${res.status}`);
    document.getElementById('resultText').value = json.text;
  } catch (err) {
    showToast('오류: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

  navigator.clipboard.writeText(text)
    .then(() => showToast('복사했어요! 📋'))
    .catch(() => { document.getElementById('resultText').select(); document.execCommand('copy'); showToast('복사됨'); });
}

/* ── 미리보기 ── */
function openModal() {
  document.getElementById('modalText').textContent = document.getElementById('resultText').value;
  document.getElementById('modal').classList.add('open');
}
document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modal').classList.remove('open'));
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('open'); });

/* ── 카카오톡 공유 ── */
async function shareKakao() {
  const text = document.getElementById('resultText').value;
  if (!text) return;
  if (navigator.share) {
    try { await navigator.share({ title:'알림장', text }); return; } catch (_) {}
  }
  await navigator.clipboard.writeText(text).catch(() => {
    document.getElementById('resultText').select(); document.execCommand('copy');
  });
  showToast('복사됐어요! 카카오톡에 붙여넣으세요 💬');
}

/* ── 이미지 저장 ── */
async function saveAsImage(transLang, transInfo, transText) {
  const text = document.getElementById('resultText').value;
  if (!text) return;

  const card = document.getElementById('printCard');
  document.getElementById('pcSchool').textContent  = schoolName;
  document.getElementById('pcDate').textContent    = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('pcContent').textContent = text;
  document.getElementById('pcSig').textContent     = buildSignature();

  // 번역문 포함 여부
  const transWrap = document.getElementById('pcTransWrap');
  if (transLang && transText) {
    document.getElementById('pcTransLabel').textContent = `${transInfo.flag} ${transInfo.native} (${transInfo.name})`;
    document.getElementById('pcTransBody').textContent  = transText;
    transWrap.style.display = '';
  } else {
    transWrap.style.display = 'none';
  }

  card.style.display = 'block';
  try {
    const canvas = await html2canvas(card, { scale:2, useCORS:true, backgroundColor:'#ffffff' });
    card.style.display = 'none';
    transWrap.style.display = 'none';
    const link = document.createElement('a');
    link.download = `알림장_${new Date().toISOString().slice(0,10)}${transLang ? '_'+transLang : ''}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('이미지로 저장됐어요! 📸');
  } catch (err) {
    card.style.display = 'none';
    transWrap.style.display = 'none';
    showToast('이미지 저장 실패: ' + err.message);
  }
}

/* ── 저장 ── */
async function saveAlrim() {
  const generated = document.getElementById('resultText').value;
  if (!generated) return;
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  try {
    const res  = await fetch('/api/alrim', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        teacher_name:   teacherInput.value.trim() || null,
        class_name:     classInput.value.trim()   || null,
        topics:         null,
        generated_text: generated,
        edited_text:    generated,
        settings:       { grade: selectedGrade, style: selectedStyle, greetingLength, greetingPosition, greetingIcon, emojiLevel, honorific },
        signature:      buildSignature(),
      }),
    });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error);
    showToast('저장됐어요! 💾');
    loadHistory();
  } catch (err) {
    showToast('저장 오류: ' + err.message);
  } finally {
    btn.disabled = false;
  }
}

/* ── 히스토리 ── */
async function loadHistory() {
  const list = document.getElementById('historyList');
  try {
    const res  = await fetch('/api/alrim');
    const json = await res.json();
    if (!json.data || json.data.length === 0) {
      list.innerHTML = '<div class="no-history">아직 저장된 알림장이 없어요.</div>';
      return;
    }
    list.innerHTML = '';
    json.data.forEach(item => {
      const el      = document.createElement('div');
      el.className  = 'history-item';
      const preview = (item.edited_text || item.generated_text || '').slice(0, 55);
      const time    = item.created_at ? item.created_at.slice(11, 16) : '';
      el.innerHTML  = `<div class="history-meta">${item.teacher_name || '선생님'} · ${item.class_name || ''} · ${time}</div><div class="history-preview">${preview}…</div>`;
      el.addEventListener('click', () => {
        document.getElementById('resultText').value = item.edited_text || item.generated_text;
        document.getElementById('resultCard').style.display = '';
        document.getElementById('resultCard').scrollIntoView({ behavior:'smooth' });
      });
      list.appendChild(el);
    });
  } catch (_) {
    list.innerHTML = '<div class="no-history">불러오기 실패</div>';
  }
}
loadHistory();

/* ── 번역 ── */
const LANGUAGES = {
  'en': { name:'영어',      native:'English',      flag:'🇬🇧' },
  'zh': { name:'중국어',    native:'中文',          flag:'🇨🇳' },
  'vi': { name:'베트남어',  native:'Tiếng Việt',   flag:'🇻🇳' },
  'ru': { name:'러시아어',  native:'Русский',       flag:'🇷🇺' },
  'uz': { name:'우즈베크어',native:'Oʻzbek',        flag:'🇺🇿' },
  'mn': { name:'몽골어',    native:'Монгол',        flag:'🇲🇳' },
  'th': { name:'태국어',    native:'ภาษาไทย',      flag:'🇹🇭' },
  'tl': { name:'필리핀어',  native:'Filipino',      flag:'🇵🇭' },
  'ja': { name:'일본어',    native:'日本語',        flag:'🇯🇵' },
};

const translateCache = new Map();

// 번역 드롭다운 토글
document.getElementById('translateBtn').addEventListener('click', e => {
  e.stopPropagation();
  const menu = document.getElementById('translateMenu');
  const isOpen = menu.style.display !== 'none';
  menu.style.display = isOpen ? 'none' : '';
});
document.addEventListener('click', () => {
  const menu = document.getElementById('translateMenu');
  if (menu) menu.style.display = 'none';
});
document.getElementById('translateMenu').addEventListener('click', e => {
  const btn = e.target.closest('button[data-lang]');
  if (!btn) return;
  translateTo(btn.dataset.lang, btn.dataset.native);
});

async function translateTo(lang, native) {
  document.getElementById('translateMenu').style.display = 'none';
  const text = document.getElementById('resultText').value;
  if (!text) { showToast('번역할 알림장이 없어요.'); return; }

  const info = LANGUAGES[lang];
  const cacheKey = `${lang}::${text}`;

  if (translateCache.has(cacheKey)) {
    renderTransCard(lang, info, translateCache.get(cacheKey));
    return;
  }

  renderTransLoading(lang, info);

  try {
    const res  = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, targetLang: lang, targetLangName: native || info.native }),
    });
    const json = await res.json();
    if (!res.ok || json.error) throw new Error(json.error || `HTTP ${res.status}`);
    translateCache.set(cacheKey, json.translated);
    renderTransCard(lang, info, json.translated);
  } catch (err) {
    removeTransCard(lang);
    showToast('번역 실패: ' + err.message);
  }
}

function renderTransLoading(lang, info) {
  removeTransCard(lang);
  const panel = document.getElementById('translatePanel');
  const card  = document.createElement('div');
  card.className    = 'trans-card';
  card.dataset.lang = lang;
  card.innerHTML    = `<div class="trans-card-header"><span class="trans-card-lang">${info.flag} ${info.native}</span></div><div class="trans-card-loading"><div class="spinner"></div>번역 중…</div>`;
  panel.appendChild(card);
}

function renderTransCard(lang, info, translated) {
  removeTransCard(lang);
  const panel = document.getElementById('translatePanel');

  const card = document.createElement('div');
  card.className    = 'trans-card';
  card.dataset.lang = lang;

  // header
  const header = document.createElement('div');
  header.className = 'trans-card-header';

  const langSpan = document.createElement('span');
  langSpan.className   = 'trans-card-lang';
  langSpan.textContent = `${info.flag} ${info.native} (${info.name})`;

  const actions = document.createElement('div');
  actions.className = 'trans-card-actions';

  const copyBtn = document.createElement('button');
  copyBtn.textContent = '📋 복사';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(translated)
      .then(() => showToast(`${info.flag} 복사됐어요!`))
      .catch(() => showToast('복사 실패'));
  });

  const shareBtn = document.createElement('button');
  shareBtn.textContent = '💬 공유';
  shareBtn.addEventListener('click', async () => {
    if (navigator.share) {
      try { await navigator.share({ title: '알림장', text: translated }); return; } catch (_) {}
    }
    await navigator.clipboard.writeText(translated).catch(() => {});
    showToast(`${info.flag} 복사됐어요! 카카오톡에 붙여넣으세요`);
  });

  const imgBtn = document.createElement('button');
  imgBtn.textContent = '📸 이미지';
  imgBtn.addEventListener('click', () => saveAsImage(lang, info, translated));

  const delBtn = document.createElement('button');
  delBtn.className   = 'trans-card-del';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', () => removeTransCard(lang));

  actions.append(copyBtn, shareBtn, imgBtn, delBtn);
  header.append(langSpan, actions);

  const body = document.createElement('div');
  body.className   = 'trans-card-body';
  body.id          = `trans-body-${lang}`;
  body.textContent = translated;

  card.append(header, body);
  panel.appendChild(card);
}

function removeTransCard(lang) {
  document.querySelector(`.trans-card[data-lang="${lang}"]`)?.remove();
}

/* ── 토스트 ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
